<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo - Oropezas.com</title>
  <link rel="stylesheet" href="/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8411594357975477" crossorigin="anonymous"></script>
<script async src="/adsense.js?v=1"></script>
<script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>
</head>
<body>
<amp-auto-ads type="adsense" data-ad-client="ca-pub-8411594357975477"></amp-auto-ads>

  <main>
    <section class="article-page">

                <div style="font-size:.75rem; color:#888;" id="article-author-top-title"></div>

            </a>

          <p id="article-excerpt" class="article-excerpt"></p>

          <!-- Ad Slot: Article Middle -->

          <!-- Author BOTTOM -->

            <p style="font-size:.7rem; text-transform:uppercase; letter-spacing:.08em; color:#999; margin:0 0 .8rem;">Publicado por</p>
            <a id="article-author-bottom-link" href="#" style="display:flex; align-items:center; gap:.9rem; text-decoration:none; color:inherit;">
              <img id="article-author-bottom-avatar" src="" alt="" style="width:52px; height:52px; border-radius:50%; object-fit:cover; background:#ddd; flex-shrink:0;">
              <div>
                <div style="font-weight:800; font-size:1rem;" id="article-author-bottom-name"></div>
                <div style="font-size:.82rem; color:#666; margin-top:2px;" id="article-author-bottom-title"></div>

  <footer></footer>

  <style>
    #chat-bot-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #000;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 16px;
      cursor: pointer;
      z-index: 9999;
    }

    #chat-window {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 360px;
      max-width: 92vw;
      height: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
      font-family: system-ui;
    }

    .chat-header {
      background: #000;
      color: white;
      padding: 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #fafafa;
    }

    .msg {
      margin: 8px 0;
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.4;
      animation: fade 0.2s ease;
    }

    .user {
      background: #000;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e9e9e9;
      color: #111;
    }

    .chat-input {
      border-top: 1px solid #eee;
      display: flex;
      align-items: flex-end;
      padding: 8px;
    }

    .chat-input textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      font-size: 16px;
      max-height: 100px;
      padding: 8px;
    }

    .chat-input button {
      background: #000;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 10px;
    }

    .typing {
      display: flex;
      gap: 4px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2){animation-delay:0.2s;}
    .typing span:nth-child(3){animation-delay:0.4s;}

    @keyframes bounce {
      0%,80%,100%{transform:scale(0);}
      40%{transform:scale(1);}
    }

    @keyframes fade {
      from{opacity:0; transform:translateY(8px);}
      to{opacity:1; transform:translateY(0);}
    }

    .msg strong {font-weight:700;}
    .msg em {font-style:italic;}
    .msg a {color:#007aff; text-decoration:none;}
    .msg ul {padding-left:18px;}
  </style>

  <button id="chat-bot-btn">💬</button>

  <div id="chat-window">
    <div class="chat-header">
      Oropezas AI
      <span id="close" style="cursor:pointer">✕</span>
    </div>

    <div class="chat-messages" id="messages">
      <div class="msg bot">Hola 👋 soy tu asistente. Pregunta lo que quieras.</div>
    </div>

    <div class="chat-input">
      <textarea id="input" rows="1" placeholder="Escribe..."></textarea>
      <button id="send">➤</button>
    </div>
  </div>

  <script>
    const API = "https://oropezas.enriquegarciaoropeza.workers.dev";

    const btn = document.getElementById("chat-bot-btn");
    const win = document.getElementById("chat-window");
    const close = document.getElementById("close");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const messages = document.getElementById("messages");

    btn.onclick = () => {
      win.style.display = win.style.display === "flex" ? "none" : "flex";
      input.focus();
    };

    close.onclick = () => win.style.display = "none";

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = input.scrollHeight + "px";
    });

    input.addEventListener("keydown", e => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendMessage(input.value);
      }
    });

    function md(text){
      return text
        .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
        .replace(/\*(.*?)\*/g,"<em>$1</em>")
        .replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" target="_blank">$1</a>')
        .replace(/\n/g,"<br>");
    }

    function add(text,type){
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerHTML = md(text);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function loader(){
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.id = "typing";
      div.innerHTML = "<span></span><span></span><span></span>";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeLoader(){
      const t = document.getElementById("typing");
      if(t) t.remove();
    }

    async function sendMessage(text){
      if(!text.trim()) return;

      add(text,"user");
      input.value = "";
      input.style.height = "auto";

      loader();

      try{
        const res = await fetch(API,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({message:text})
        });

        const data = await res.json();
        removeLoader();

        smartType(data.reply || "Error");

      }catch{
        removeLoader();
        add("Error de conexión.","bot");
      }
    }

    function smartType(text){
      const div = document.createElement("div");
      div.className = "msg bot";
      messages.appendChild(div);

      let i = 0;
      function chunk(){
        if(i < text.length){
          div.innerHTML = md(text.slice(0, i));
          i += 3;
          messages.scrollTop = messages.scrollHeight;
          setTimeout(chunk, 15);
        }
      }
      chunk();
    }

    send.onclick = () => sendMessage(input.value);
  </script>

  <script src="/main.js"></script>
  <script src="/js/article.js"></script>
<script src="auth.js?v=4"></script>
</body>
</html>
