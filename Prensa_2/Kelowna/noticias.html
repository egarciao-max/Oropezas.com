<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://oropezas.com/styles.css">
<title>News - KELOWNA.OROPEZAS.COM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8411594357975477" crossorigin="anonymous"></script>
<script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>
</head>
<body data-page="noticias" data-site="kelowna">

<header></header>

<main>
  <h1 class="page-title">All Articles</h1>
  <p class="page-description">Everything happening in Kelowna.</p>
  <div class="articles-grid" id="articles-grid"></div>
</main>

<footer></footer>

<style>
#chat-bot-btn { position: fixed; bottom: 20px; right: 20px; background: #000; color: white; border: none; border-radius: 50px; padding: 12px 16px; cursor: pointer; z-index: 9999; }
#chat-window { position: fixed; bottom: 80px; right: 20px; width: 360px; max-width: 92vw; height: 520px; background: #fff; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: none; flex-direction: column; overflow: hidden; font-family: system-ui; }
.chat-header { background: #000; color: white; padding: 14px; font-weight: 600; display: flex; justify-content: space-between; }
.chat-messages { flex: 1; overflow-y: auto; padding: 14px; background: #fafafa; }
.msg { margin: 8px 0; max-width: 80%; padding: 12px 14px; border-radius: 16px; line-height: 1.4; }
.user { background: #000; color: white; margin-left: auto; }
.bot { background: #e9e9e9; color: #111; }
.chat-input { border-top: 1px solid #eee; display: flex; align-items: flex-end; padding: 8px; }
.chat-input textarea { flex: 1; resize: none; border: none; outline: none; font-size: 16px; max-height: 100px; padding: 8px; }
.chat-input button { background: #000; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 10px; }
.typing { display: flex; gap: 4px; }
.typing span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s;} .typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce { 0%,80%,100%{transform:scale(0);} 40%{transform:scale(1);} }
</style>

<button id="chat-bot-btn"><i class="bi bi-chat-dots"></i></button>
<div id="chat-window">
  <div class="chat-header">Kelowna AI <span id="close" style="cursor:pointer">✕</span></div>
  <div class="chat-messages" id="messages"><div class="msg bot">Hi 👋 I'm your Kelowna news assistant. Ask me anything.</div></div>
  <div class="chat-input">
    <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send">➤</button>
  </div>
</div>

<script>
const API = "https://oropezas.enriquegarciaoropeza.workers.dev";

const btn = document.getElementById("chat-bot-btn");
const win = document.getElementById("chat-window");
const close = document.getElementById("close");
const input = document.getElementById("input");
const send = document.getElementById("send");
const messages = document.getElementById("messages");
btn.onclick = () => { win.style.display = win.style.display === "flex" ? "none" : "flex"; input.focus(); };
close.onclick = () => win.style.display = "none";
input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
input.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(input.value); }});
function md(t){ return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>").replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n/g,"<br>"); }
function add(t,y){ const d=document.createElement("div"); d.className="msg "+y; d.innerHTML=md(t); messages.appendChild(d); messages.scrollTop=messages.scrollHeight; }
function loader(){ const d=document.createElement("div"); d.className="msg bot typing"; d.id="typing"; d.innerHTML="<span></span><span></span><span></span>"; messages.appendChild(d); messages.scrollTop=messages.scrollHeight; }
function removeLoader(){ const t=document.getElementById("typing"); if(t) t.remove(); }
async function sendMessage(text){ if(!text.trim()) return; add(text,"user"); input.value=""; input.style.height="auto"; loader(); try{ const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,site:"kelowna"})}); const d=await r.json(); removeLoader(); type(d.reply||"I can help with Kelowna.Oropezas.com"); }catch{ removeLoader(); add("Connection error.","bot"); }}
function type(text){ const d=document.createElement("div"); d.className="msg bot"; messages.appendChild(d); let i=0; function c(){ if(i<text.length){ d.innerHTML=md(text.slice(0,i)); i+=3; messages.scrollTop=messages.scrollHeight; setTimeout(c,15); } } c(); }
send.onclick = () => sendMessage(input.value);
</script>

<script src="kelowna-articles.js"></script>
<script src="main.js"></script>
<script src="../auth.js"></script>

</body>
</html>
