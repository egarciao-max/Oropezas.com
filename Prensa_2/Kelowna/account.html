<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles.css">
    <title>My Account — Kelowna.Oropezas.com</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body data-site="kelowna">

<header></header>

<main class="account-page">
    <div class="account-container">
        <h1 class="account-title">My Account</h1>
        <p class="account-subtitle" id="account-subtitle">Manage your profile and settings.</p>

        <!-- Loading -->
        <div id="account-loading" style="text-align:center;padding:3rem 1rem;color:#555;">
            <div style="width:32px;height:32px;border:3px solid #f3f3f3;border-top:3px solid #000;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem;"></div>
            <p>Loading your profile...</p>
            <style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
        </div>

        <!-- Not Logged In -->
        <div id="account-not-logged" style="display:none;text-align:center;padding:3rem 1rem;">
            <i class="bi bi-person-lock" style="font-size:3rem;color:#ccc;display:block;margin-bottom:1rem;"></i>
            <h2 style="margin-bottom:0.5rem;">Not Signed In</h2>
            <p style="color:#666;margin-bottom:1.5rem;">Please sign in to view your account.</p>
            <button class="read-more-btn" onclick="OROPEZAS_AUTH.openLoginModal()">Sign In</button>
        </div>

        <!-- Profile Card -->
        <div id="account-profile" style="display:none;">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-wrap" style="position:relative;width:80px;height:80px;flex-shrink:0;">
                        <img id="profile-picture" src="" alt="Profile" class="profile-avatar" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:none;" onerror="this.style.display='none';document.getElementById('profile-avatar-fallback').style.display='flex';">
                        <div id="profile-avatar-fallback" style="display:flex;width:80px;height:80px;border-radius:50%;background:var(--black);color:var(--white);align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;text-transform:uppercase;">?</div>
                    </div>
                    <div class="profile-info">
                        <h2 id="profile-name" class="profile-name">User</h2>
                        <p id="profile-email" class="profile-email">email@example.com</p>
                        <span id="profile-role" class="profile-role">user</span>
                        <p id="profile-date" class="profile-date" style="font-size:0.75rem;color:#888;margin-top:0.25rem;"></p>
                    </div>
                </div>

                <div class="profile-actions">
                    <a href="/kelowna/" class="read-more-btn" style="text-decoration:none;text-align:center;">Back to Home</a>
                    <button class="read-more-btn" onclick="OROPEZAS_AUTH.logout();window.location.reload();" style="background:transparent;color:var(--black);border:2px solid var(--black);">Sign Out</button>
                </div>
            </div>

            <!-- Admin Dashboard Link -->
            <div class="admin-only" style="margin-top:2rem;padding:1.5rem;background:var(--gray-light);border-radius:4px;text-align:center;">
                <h3 style="margin-bottom:0.5rem;"><i class="bi bi-robot"></i> AI Dashboard</h3>
                <p style="color:var(--gray-text);font-size:0.85rem;margin-bottom:1rem;">Generate and publish articles with AI.</p>
                <a href="/kelowna/dashboard.html" class="read-more-btn" style="text-decoration:none;display:inline-block;">Open Dashboard</a>
            </div>
        </div>
    </div>
</main>

<footer></footer>

<script>
const API = "https://oropezas.enriquegarciaoropeza.workers.dev";

// Account page logic
function initAccount() {
    const user = OROPEZAS_AUTH.getUser();
    const loading = document.getElementById('account-loading');
    const notLogged = document.getElementById('account-not-logged');
    const profile = document.getElementById('account-profile');
    const subtitle = document.getElementById('account-subtitle');

    if (!user) {
        loading.style.display = 'none';
        notLogged.style.display = 'block';
        profile.style.display = 'none';
        subtitle.textContent = 'Sign in to manage your profile.';
        return;
    }

    // Populate profile
    document.getElementById('profile-name').textContent = user.name || 'User';
    document.getElementById('profile-email').textContent = user.email || '';

    const pic = document.getElementById('profile-picture');
    const fallback = document.getElementById('profile-avatar-fallback');
    const avatarUrl = user.picture || user.avatar || '';
    if (avatarUrl) {
        pic.src = avatarUrl;
        pic.style.display = 'block';
        fallback.style.display = 'none';
    } else {
        pic.style.display = 'none';
        fallback.style.display = 'flex';
        // Set initials
        const initials = (user.name || 'U').split(' ').map(n => n[0]).join('').substring(0, 2);
        fallback.textContent = initials;
    }

    const roleSpan = document.getElementById('profile-role');
    const role = user.role || 'user';
    const privileged = ['admin', 'ceo', 'founder'].includes(role);
    roleSpan.textContent = role.toUpperCase();
    roleSpan.style.background = privileged ? '#c8102e' : '#007bff';
    roleSpan.style.color = '#fff';
    roleSpan.style.padding = '2px 10px';
    roleSpan.style.borderRadius = '12px';
    roleSpan.style.fontSize = '0.7rem';
    roleSpan.style.fontWeight = '700';
    roleSpan.style.letterSpacing = '0.05em';

    const dateEl = document.getElementById('profile-date');
    if (user.createdAt) {
        dateEl.textContent = 'Joined: ' + new Date(user.createdAt).toLocaleDateString();
    }

    loading.style.display = 'none';
    notLogged.style.display = 'none';
    profile.style.display = 'block';

    // Update admin visibility (privileged roles: admin, ceo, founder)
    const isPrivileged = ['admin', 'ceo', 'founder'].includes(user.role || '');
    document.querySelectorAll('.admin-only').forEach(el => {
        el.style.display = isPrivileged ? 'block' : 'none';
    });
}

// Wait for auth to init, then run
document.addEventListener('DOMContentLoaded', () => {
    // Give auth.js time to init and load user
    setTimeout(initAccount, 100);
});
</script>

<script src="main.js"></script>
<script src="../auth.js"></script>

</body>
</html>
