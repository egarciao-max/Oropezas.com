<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://oropezas.com/styles.css">
    <title>KELOWNA.OROPEZAS.COM - Local news from Kelowna, BC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body data-page="index" data-site="kelowna">

    <header></header>

    <main>
        <!-- FEATURED ARTICLE (dinámico) -->
        <section class="featured-section">
            <div id="featured-container"></div>
        </section>

        <!-- LATEST NEWS (dinámico) -->
        <section class="latest-section">
            <h2 class="section-title">Latest News</h2>
            <div id="articles-grid" class="news-grid"></div>
        </section>
    </main>

    <footer></footer>

<!-- ========== KELOWNA AI CHAT ========= -->
<style>
#chat-bot-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #000;
  color: white;
  border: none;
  border-radius: 50px;
  padding: 12px 16px;
  cursor: pointer;
  z-index: 9999;
}
#chat-window {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 360px;
  max-width: 92vw;
  height: 520px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-family: system-ui;
}
.chat-header {
  background: #000;
  color: white;
  padding: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  background: #fafafa;
}
.msg {
  margin: 8px 0;
  max-width: 80%;
  padding: 12px 14px;
  border-radius: 16px;
  line-height: 1.4;
  animation: fade 0.2s ease;
}
.user {
  background: #000;
  color: white;
  margin-left: auto;
}
.bot {
  background: #e9e9e9;
  color: #111;
}
.chat-input {
  border-top: 1px solid #eee;
  display: flex;
  align-items: flex-end;
  padding: 8px;
}
.chat-input textarea {
  flex: 1;
  resize: none;
  border: none;
  outline: none;
  font-size: 16px;
  max-height: 100px;
  padding: 8px;
}
.chat-input button {
  background: #000;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 10px;
}
.typing {
  display: flex;
  gap: 4px;
}
.typing span {
  width: 6px;
  height: 6px;
  background: #888;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce {
  0%,80%,100%{transform:scale(0);}
  40%{transform:scale(1);}
}
@keyframes fade {
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}
.msg strong {font-weight:700;}
.msg em {font-style:italic;}
.msg a {color:#007aff; text-decoration:none;}
.msg ul {padding-left:18px;}
</style>

<button id="chat-bot-btn"><i class="bi bi-chat-dots"></i></button>

<div id="chat-window">
  <div class="chat-header">
    Kelowna AI
    <span id="close" style="cursor:pointer">✕</span>
  </div>
  <div class="chat-messages" id="messages">
    <div class="msg bot">Hi 👋 I'm your Kelowna news assistant. Ask me anything.</div>
  </div>
  <div class="chat-input">
    <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send">➤</button>
  </div>
</div>

<script>
const API = "https://oropezas.enriquegarciaoropeza.workers.dev";

const btn = document.getElementById("chat-bot-btn");
const win = document.getElementById("chat-window");
const close = document.getElementById("close");
const input = document.getElementById("input");
const send = document.getElementById("send");
const messages = document.getElementById("messages");

btn.onclick = () => {
  win.style.display = win.style.display === "flex" ? "none" : "flex";
  input.focus();
};
close.onclick = () => win.style.display = "none";

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage(input.value);
  }
});

function md(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/\n/g,"<br>");
}

function add(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = md(text);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function loader(){
  const div = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typing";
  div.innerHTML = "<span></span><span></span><span></span>";
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeLoader(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

async function sendMessage(text){
  if(!text.trim()) return;
  add(text,"user");
  input.value = "";
  input.style.height = "auto";
  loader();
  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message:text, site:"kelowna"})
    });
    const data = await res.json();
    removeLoader();
    smartType(data.reply || "I can help you with something related to Kelowna.Oropezas.com");
  }catch{
    removeLoader();
    add("Connection error.","bot");
  }
}

function smartType(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  messages.appendChild(div);
  let i = 0;
  function chunk(){
    if(i < text.length){
      div.innerHTML = md(text.slice(0, i));
      i += 3;
      messages.scrollTop = messages.scrollHeight;
      setTimeout(chunk, 15);
    }
  }
  chunk();
}

send.onclick = () => sendMessage(input.value);
</script>

<script src="main.js"></script>
<script src="news-loader.js"></script>
<script src="../auth.js"></script>

<script>
// Kelowna news loader with site filter
(function loadKelownaNews() {
  fetch(API + '/api/articles?site=kelowna')
    .then(r => r.json())
    .then(data => {
      const articles = data.articles || [];
      const featuredContainer = document.getElementById('featured-container');
      const articlesGrid = document.getElementById('articles-grid');

      if (articles.length > 0 && featuredContainer) {
        const a = articles[0];
        featuredContainer.innerHTML = `
          <div class="featured-article">
            <div class="featured-image" style="cursor:pointer;" onclick="location.href='article.html?slug=${a.slug}'">
              <img src="${a.image || '../LOGO.jpeg'}" alt="${a.title}" style="width:100%;height:100%;object-fit:cover;"
                onerror="this.style.display='none';this.parentElement.style.background='var(--gray-light)';this.parentElement.innerHTML='<span style=font-size:3rem;color:var(--gray-text);>📰</span>';">
            </div>
            <div class="featured-content">
              <span class="news-tag">${a.category || 'News'}</span>
              <h1>${a.title}</h1>
              <p class="subtitle">${a.excerpt || a.subtitle || ''}</p>
              <div class="article-meta">
                <span>${a.date || ''}</span>
                <span>${a.author || 'Kelowna News'}</span>
              </div>
              <a href="article.html?slug=${a.slug}" class="read-more">Read more →</a>
            </div>
          </div>`;
      }

      if (articlesGrid) {
        const gridArticles = articles.slice(1, 7);
        if (gridArticles.length === 0) {
          articlesGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--gray-text);padding:3rem;">No articles yet. Check back soon!</p>';
        }
        gridArticles.forEach(a => {
          const card = document.createElement('div');
          card.className = 'news-card';
          card.style.cursor = 'pointer';
          card.onclick = () => location.href = 'article.html?slug=' + a.slug;
          card.innerHTML = `
            <div class="news-card-image">
              <img src="${a.image || '../LOGO.jpeg'}" alt="${a.title}" style="width:100%;height:100%;object-fit:cover;"
                onerror="this.style.display='none';this.parentElement.style.background='var(--gray-light)';this.parentElement.innerHTML='<span style=font-size:2.5rem;color:var(--gray-text);>📰</span>';">
            </div>
            <h3>${a.title}</h3>
            <p class="news-card-excerpt">${a.excerpt || ''}</p>
            <span class="news-card-date">${a.date || ''}</span>
            <span class="news-card-link">Read more →</span>`;
          articlesGrid.appendChild(card);
        });
      }
    })
    .catch(err => {
      console.error('Error loading news:', err);
      const g = document.getElementById('articles-grid');
      if (g) g.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--gray-text);padding:3rem;">Unable to load articles.</p>';
    });
})();
</script>

</body>
</html>
