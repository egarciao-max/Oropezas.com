<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://oropezas.com/styles.css">
  <title>Article - Kelowna.Oropezas.com</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body data-site="kelowna">

  <header></header>

  <main>
    <section class="article-page">
      <div class="container">
        <article class="article-content-wrap">
          <p id="article-category" class="news-tag"></p>
          <h1 id="article-title"></h1>
          <p id="article-date" class="news-date"></p>
          <p id="article-excerpt" class="article-excerpt"></p>
          <img id="article-image" class="featured-image" alt="" style="display:none;">
          <div id="article-content" class="article-body"></div>
          <div id="article-tags" style="margin-top:2rem;padding-top:1rem;border-top:1px solid #eee;display:none;"></div>
        </article>
      </div>
    </section>
  </main>

  <footer></footer>

<style>
#chat-bot-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #000;
  color: white;
  border: none;
  border-radius: 50px;
  padding: 12px 16px;
  cursor: pointer;
  z-index: 9999;
}
#chat-window {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 360px;
  max-width: 92vw;
  height: 520px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-family: system-ui;
}
.chat-header {
  background: #000;
  color: white;
  padding: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  background: #fafafa;
}
.msg {
  margin: 8px 0;
  max-width: 80%;
  padding: 12px 14px;
  border-radius: 16px;
  line-height: 1.4;
}
.user {
  background: #000;
  color: white;
  margin-left: auto;
}
.bot {
  background: #e9e9e9;
  color: #111;
}
.chat-input {
  border-top: 1px solid #eee;
  display: flex;
  align-items: flex-end;
  padding: 8px;
}
.chat-input textarea {
  flex: 1;
  resize: none;
  border: none;
  outline: none;
  font-size: 16px;
  max-height: 100px;
  padding: 8px;
}
.chat-input button {
  background: #000;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  border-radius: 10px;
}
.typing {
  display: flex;
  gap: 4px;
}
.typing span {
  width: 6px;
  height: 6px;
  background: #888;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce {
  0%,80%,100%{transform:scale(0);}
  40%{transform:scale(1);}
}
</style>

<button id="chat-bot-btn"><i class="bi bi-chat-dots"></i></button>
<div id="chat-window">
  <div class="chat-header">Kelowna AI <span id="close" style="cursor:pointer">✕</span></div>
  <div class="chat-messages" id="messages">
    <div class="msg bot">Hi 👋 I'm your Kelowna news assistant. Ask me anything.</div>
  </div>
  <div class="chat-input">
    <textarea id="input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send">➤</button>
  </div>
</div>

<script>
const API = "https://oropezas.enriquegarciaoropeza.workers.dev";

const btn = document.getElementById("chat-bot-btn");
const win = document.getElementById("chat-window");
const close = document.getElementById("close");
const input = document.getElementById("input");
const send = document.getElementById("send");
const messages = document.getElementById("messages");

btn.onclick = () => { win.style.display = win.style.display === "flex" ? "none" : "flex"; input.focus(); };
close.onclick = () => win.style.display = "none";
input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
input.addEventListener("keydown", e => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(input.value); }});

function md(t){ return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>").replace(/\[(.*?)\]\((.*?)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n/g,"<br>"); }
function add(t,y){ const d=document.createElement("div"); d.className="msg "+y; d.innerHTML=md(t); messages.appendChild(d); messages.scrollTop=messages.scrollHeight; }
function loader(){ const d=document.createElement("div"); d.className="msg bot typing"; d.id="typing"; d.innerHTML="<span></span><span></span><span></span>"; messages.appendChild(d); messages.scrollTop=messages.scrollHeight; }
function removeLoader(){ const t=document.getElementById("typing"); if(t) t.remove(); }
async function sendMessage(text){ if(!text.trim()) return; add(text,"user"); input.value=""; input.style.height="auto"; loader(); try{ const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,site:"kelowna"})}); const d=await r.json(); removeLoader(); type(d.reply||"I can help with Kelowna.Oropezas.com"); }catch{ removeLoader(); add("Connection error.","bot"); }}
function type(text){ const d=document.createElement("div"); d.className="msg bot"; messages.appendChild(d); let i=0; function c(){ if(i<text.length){ d.innerHTML=md(text.slice(0,i)); i+=3; messages.scrollTop=messages.scrollHeight; setTimeout(c,15); } } c(); }
send.onclick = () => sendMessage(input.value);

// Load article
(function() {
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  if (!slug) { document.getElementById('article-title').textContent = 'Article not found'; return; }

  fetch(API + '/api/article/' + slug)
    .then(r => r.json())
    .then(article => {
      if (article.success === false) {
        document.getElementById('article-title').textContent = 'Article not found';
        return;
      }
      document.getElementById('article-category').textContent = article.category || 'News';
      document.getElementById('article-title').textContent = article.title || '';
      document.getElementById('article-date').textContent = article.date || '';
      document.getElementById('article-excerpt').textContent = article.subtitle || article.excerpt || '';
      if (article.featuredImage || article.image) {
        const img = document.getElementById('article-image');
        img.src = article.featuredImage || article.image;
        img.style.display = 'block';
      }
      const contentDiv = document.getElementById('article-content');
      if (article.html) {
        contentDiv.innerHTML = article.html;
      } else if (article.content && Array.isArray(article.content)) {
        contentDiv.innerHTML = article.content.map(b => b.html).join('');
      } else {
        contentDiv.textContent = article.excerpt || '';
      }
      if (article.tags && article.tags.length) {
        const tagsDiv = document.getElementById('article-tags');
        tagsDiv.style.display = 'block';
        tagsDiv.innerHTML = article.tags.map(t => `<span style="background:#f5f5f5;padding:4px 12px;border-radius:20px;font-size:0.8rem;margin-right:8px;">${t}</span>`).join('');
      }
      document.title = (article.title || 'Article') + ' - Kelowna.Oropezas.com';
    })
    .catch(e => {
      console.error('Error loading article:', e);
      document.getElementById('article-title').textContent = 'Error loading article';
    });
})();
</script>

<script src="main.js"></script>
<script src="../auth.js"></script>

</body>
</html>
