<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foro - OROPEZAS.COM</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8411594357975477" crossorigin="anonymous"></script>
<script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>
</head>
<body data-page="foros">

<header></header>

<main class="foros-page">
  <div class="foros-container foros-thread-view">

    <!-- Breadcrumb -->
    <nav class="foros-breadcrumb">
      <a href="foros.html"><i class="bi bi-chat-square-dots"></i> Foros</a>
      <i class="bi bi-chevron-right"></i>
      <span id="thread-cat-label">—</span>
    </nav>

    <!-- Hilo principal -->
    <div id="thread-main" class="foros-thread-main">
      <div class="foros-loading">
        <i class="bi bi-arrow-repeat foros-spinner"></i>
        <span>Cargando hilo...</span>
      </div>
    </div>

    <!-- Respuestas -->
    <div id="thread-replies" class="foros-replies"></div>

    <!-- Caja de respuesta -->
    <div id="thread-reply-box" class="foros-reply-box" style="display:none;">
      <h3 class="foros-reply-title">Tu respuesta</h3>
      <textarea id="reply-body" placeholder="Escribe tu respuesta..." rows="4" maxlength="2000"></textarea>
      <div class="foros-reply-footer">
        <span class="foros-char-count"><span id="reply-count">0</span>/2000</span>
        <button id="reply-submit" class="foros-submit-btn" onclick="threadApp.submitReply()">
          <i class="bi bi-send"></i> Responder
        </button>
      </div>
      <div id="reply-error" class="foros-error" style="display:none;"></div>
    </div>

    <!-- Login prompt si no está autenticado -->
    <div id="thread-login-prompt" class="foros-login-prompt" style="display:none;">
      <i class="bi bi-lock"></i>
      <p>Inicia sesión para participar en el foro.</p>
      <button class="foros-submit-btn" onclick="OROPEZAS_AUTH.openLoginModal()">Iniciar sesión</button>
    </div>

  </div>
</main>

<footer></footer>

<script src="main.js"></script>
<script src="auth.js?v=4"></script>
<script>
const WORKER = 'https://oropezas.enriquegarciaoropeza.workers.dev';

const threadApp = (() => {
  const params = new URLSearchParams(window.location.search);
  const threadId = params.get('id');
  let thread = null;

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('es-MX', {
      day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  }
  function authorBadge(email) {
    if (email === 'enrique@oropezas.com') {
      return `<span class="foros-verified-badge"><i class="bi bi-patch-check-fill"></i> Fundador & CEO</span>`;
    }
    return '';
  }

  async function load() {
    if (!threadId) { window.location = 'foros.html'; return; }
    try {
      const res = await fetch(`${WORKER}/api/foros/threads/${threadId}`);
      const data = await res.json();
      if (!data.success) throw new Error();
      thread = data.thread;
      renderThread();
      renderReplies(data.replies || []);
      renderReplyBox();
      document.title = `${thread.title} — Foros OROPEZAS.COM`;
      document.getElementById('thread-cat-label').textContent = thread.category;
    } catch (e) {
      document.getElementById('thread-main').innerHTML = `
        <div class="foros-empty"><i class="bi bi-exclamation-circle"></i><p>No se encontró este hilo.</p></div>`;
    }
  }

  function renderThread() {
    const el = document.getElementById('thread-main');
    el.innerHTML = `
      <div class="foros-post foros-post-op">
        <div class="foros-post-author">
          ${thread.authorPicture
            ? `<img src="${thread.authorPicture}" class="foros-post-avatar">`
            : `<div class="foros-post-avatar-placeholder"><i class="bi bi-person-fill"></i></div>`}
          <div class="foros-post-author-info">
            <span class="foros-post-name">${escHtml(thread.authorName)} ${authorBadge(thread.authorEmail)}</span>
            <span class="foros-post-date">${formatDate(thread.createdAt)}</span>
          </div>
          <span class="foros-cat-tag foros-cat-${thread.category} ms-auto">${thread.category}</span>
        </div>
        <h1 class="foros-post-op-title">${escHtml(thread.title)}</h1>
        <div class="foros-post-body">${escHtml(thread.body).replace(/\n/g, '<br>')}</div>
      </div>`;
  }

  function renderReplies(replies) {
    const el = document.getElementById('thread-replies');
    if (!replies.length) { el.innerHTML = ''; return; }
    el.innerHTML = `<h3 class="foros-replies-title">${replies.length} respuesta${replies.length !== 1 ? 's' : ''}</h3>` +
      replies.map((r, i) => `
        <div class="foros-post foros-post-reply">
          <div class="foros-post-author">
            ${r.authorPicture
              ? `<img src="${r.authorPicture}" class="foros-post-avatar">`
              : `<div class="foros-post-avatar-placeholder"><i class="bi bi-person-fill"></i></div>`}
            <div class="foros-post-author-info">
              <span class="foros-post-name">${escHtml(r.authorName)} ${authorBadge(r.authorEmail)}</span>
              <span class="foros-post-date">${formatDate(r.createdAt)}</span>
            </div>
            <span class="foros-reply-num">#${i + 1}</span>
          </div>
          <div class="foros-post-body">${escHtml(r.body).replace(/\n/g, '<br>')}</div>
        </div>`).join('');
  }

  function renderReplyBox() {
    const user = OROPEZAS_AUTH.getUser();
    document.getElementById('thread-reply-box').style.display   = user ? 'block' : 'none';
    document.getElementById('thread-login-prompt').style.display = user ? 'none' : 'flex';
  }

  async function submitReply() {
    const user = OROPEZAS_AUTH.getUser();
    if (!user) { OROPEZAS_AUTH.openLoginModal(); return; }

    const body = document.getElementById('reply-body').value.trim();
    const errEl = document.getElementById('reply-error');
    const btn   = document.getElementById('reply-submit');

    if (!body || body.length < 5) {
      errEl.textContent = 'La respuesta debe tener al menos 5 caracteres.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Moderando…';
    errEl.style.display = 'none';

    try {
      const res = await fetch(`${WORKER}/api/foros/threads/${threadId}/replies`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          body,
          authorId: user.id,
          authorName: user.name,
          authorEmail: user.email,
          authorPicture: user.picture,
          token: user.token,
        }),
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('reply-body').value = '';
        document.getElementById('reply-count').textContent = '0';
        await load();
        document.getElementById('thread-replies').scrollIntoView({ behavior: 'smooth' });
      } else if (data.moderated) {
        errEl.textContent = `⚠️ Tu respuesta fue rechazada: "${data.reason}"`;
        errEl.style.display = 'block';
      } else {
        errEl.textContent = data.error || 'Error al publicar.';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = 'Error de conexión. Intenta de nuevo.';
      errEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-send"></i> Responder';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const ta = document.getElementById('reply-body');
    if (ta) ta.addEventListener('input', () => {
      document.getElementById('reply-count').textContent = ta.value.length;
    });
    load();
    document.addEventListener('oropezas:login',  renderReplyBox);
    document.addEventListener('oropezas:logout', renderReplyBox);
  });

  return { submitReply };
})();
</script>
</body>
</html>
